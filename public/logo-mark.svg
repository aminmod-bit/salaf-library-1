<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Salaf Library">
  <defs>
    <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="96" height="96" rx="24" fill="url(#g-gold)"/>
  <!-- Book icon -->
  <g transform="translate(64, 64)">
    <!-- Left page -->
    <path d="M-4-20 Q-20-20-26-8 L-26 22 Q-20 10-4 4 Z" fill="#1a3a24" opacity="0.9"/>
    <!-- Right page -->
    <path d="M4-20 Q20-20 26-8 L26 22 Q20 10 4 4 Z" fill="#1a3a24" opacity="0.75"/>
    <!-- Spine -->
    <line x1="0" y1="-22" x2="0" y2="24" stroke="#1a3a24" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left lines -->
    <line x1="-22" y1="0" x2="-8" y2="-6" stroke="#f5d76e" stroke-width="1.2" opacity="0.5"/>
    <line x1="-22" y1="6" x2="-8" y2="0" stroke="#f5d76e" stroke-width="1.2" opacity="0.5"/>
    <line x1="-22" y1="12" x2="-8" y2="6" stroke="#f5d76e" stroke-width="1.2" opacity="0.5"/>
    <!-- Right lines -->
    <line x1="8" y1="-6" x2="22" y2="0" stroke="#f5d76e" stroke-width="1.2" opacity="0.4"/>
    <line x1="8" y1="0" x2="22" y2="6" stroke="#f5d76e" stroke-width="1.2" opacity="0.4"/>
    <line x1="8" y1="6" x2="22" y2="12" stroke="#f5d76e" stroke-width="1.2" opacity="0.4"/>
  </g>
</svg>
