<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salaf Library — Офлайн</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        background: #0a1a0f;
        color: #f0f4f1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 400px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #d4af37;
      }
      p {
        font-size: 16px;
        color: #9db8a3;
        line-height: 1.5;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      button {
        margin-top: 24px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #d4af37, #f0c84a);
        color: #0a1a0f;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        transform: translateY(-1px);
      }
      @media (prefers-color-scheme: light) {
        body { background: #f5f7f5; color: #1a1a1a; }
        h1 { color: #b8860b; }
        p { color: #4a5a4a; }
        button { color: #1a1a1a; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Нет подключения</h1>
      <p>Похоже, вы сейчас офлайн. Некоторые разделы библиотеки могут быть недоступны. Проверьте подключение к интернету и попробуйте снова.</p>
      <button onclick="window.location.reload()">Перезагрузить</button>
    </div>
  </body>
</html>
