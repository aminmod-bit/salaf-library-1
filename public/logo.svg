<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="Salaf Library">
  <defs>
    <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c84a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8960e"/>
    </linearGradient>
    <linearGradient id="g-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a24"/>
      <stop offset="100%" stop-color="#0d2218"/>
    </linearGradient>
  </defs>

  <!-- Icon group -->
  <g transform="translate(24, 8) scale(0.85)">
    <!-- Background arch / mihrab -->
    <path d="M20 92 Q20 22 64 14 Q108 22 108 92 L108 116 Q108 120 104 120 L24 120 Q20 120 20 116 Z"
          fill="url(#g-dark)" stroke="url(#g-gold)" stroke-width="2.5"/>
    <path d="M30 90 Q30 32 64 24 Q98 32 98 90"
          fill="none" stroke="url(#g-gold)" stroke-width="1.2" opacity="0.4"/>
    <!-- Open book -->
    <g transform="translate(64, 72)">
      <path d="M0 0 Q-22 -6 -32 6 L-32 30 Q-22 18 0 12 Z" fill="#f8f5ec" opacity="0.95"/>
      <path d="M0 0 Q22 -6 32 6 L32 30 Q22 18 0 12 Z" fill="#ede8da" opacity="0.9"/>
      <line x1="0" y1="-2" x2="0" y2="32" stroke="url(#g-gold)" stroke-width="1.8"/>
      <line x1="-28" y1="10" x2="-6" y2="4" stroke="#ccc5b0" stroke-width="0.8" opacity="0.6"/>
      <line x1="-28" y1="16" x2="-6" y2="10" stroke="#ccc5b0" stroke-width="0.8" opacity="0.6"/>
      <line x1="-28" y1="22" x2="-6" y2="16" stroke="#ccc5b0" stroke-width="0.8" opacity="0.6"/>
      <line x1="6" y1="4" x2="28" y2="10" stroke="#ccc5b0" stroke-width="0.8" opacity="0.5"/>
      <line x1="6" y1="10" x2="28" y2="16" stroke="#ccc5b0" stroke-width="0.8" opacity="0.5"/>
      <line x1="6" y1="16" x2="28" y2="22" stroke="#ccc5b0" stroke-width="0.8" opacity="0.5"/>
    </g>
    <path d="M64 18 l5 7 -5 7 -5-7z" fill="url(#g-gold)" opacity="0.85"/>
    <line x1="34" y1="110" x2="94" y2="110" stroke="url(#g-gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="34" cy="110" r="1.5" fill="url(#g-gold)" opacity="0.6"/>
    <circle cx="94" cy="110" r="1.5" fill="url(#g-gold)" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="160" y="68" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700">Salaf Library</text>
  <line x1="160" y1="82" x2="420" y2="82" stroke="url(#g-gold)" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="112" fill="#555" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="3">ИСЛАМСКАЯ БИБЛИОТЕКА</text>
</svg>
